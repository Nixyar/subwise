<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand__identity">
        <div class="brand__icon">
          <mat-icon class="brand__icon-symbol">auto_awesome</mat-icon>
        </div>
        <span class="brand__title">SubWise</span>
      </div>

      <div class="language-picker language-picker--desktop">
        <button
          type="button"
          class="language-picker__trigger"
          [matMenuTriggerFor]="languageMenu"
        >
          <span class="language-picker__code">{{ activeLanguage().shortLabel }}</span>
          <mat-icon class="language-picker__icon">expand_more</mat-icon>
        </button>
      </div>
    </div>

    <nav class="sidebar__nav">
      <a
        routerLink="/"
        routerLinkActive="bg-indigo-50 text-indigo-700"
        [routerLinkActiveOptions]="{exact: true}"
        class="nav-link"
      >
        <mat-icon class="nav-link__icon">dashboard</mat-icon>
        {{ copy().dashboard }}
      </a>
      <a
        routerLink="/sovety"
        routerLinkActive="bg-indigo-50 text-indigo-700"
        class="nav-link"
      >
        <mat-icon class="nav-link__icon">lightbulb</mat-icon>
        {{ copy().insights }}
      </a>
      <a
        routerLink="/summary"
        routerLinkActive="bg-indigo-50 text-indigo-700"
        class="nav-link"
      >
        <mat-icon class="nav-link__icon">share</mat-icon>
        {{ copy().summary }}
      </a>
    </nav>

    <div class="sidebar__cta">
      <a
        routerLink="/add"
        class="primary-link"
      >
        <mat-icon class="primary-link__icon">add</mat-icon>
        {{ copy().add }}
      </a>
    </div>
  </aside>

  <main class="content">
    <div class="language-picker language-picker--mobile">
      <button
        type="button"
        class="language-picker__trigger"
        [matMenuTriggerFor]="languageMenu"
      >
        <span class="language-picker__code">{{ activeLanguage().shortLabel }}</span>
        <mat-icon class="language-picker__icon">expand_more</mat-icon>
      </button>
    </div>
    <router-outlet></router-outlet>
  </main>

  <nav class="bottom-nav">
    <a
      routerLink="/"
      routerLinkActive="text-indigo-600"
      [routerLinkActiveOptions]="{exact: true}"
      class="bottom-nav__link"
    >
      <mat-icon>dashboard</mat-icon>
      <span class="bottom-nav__label">{{ copy().dashboard }}</span>
    </a>
    <a
      routerLink="/sovety"
      routerLinkActive="text-indigo-600"
      class="bottom-nav__link"
    >
      <mat-icon>lightbulb</mat-icon>
      <span class="bottom-nav__label">{{ copy().insights }}</span>
    </a>
    <div class="bottom-nav__cta-wrap">
      <a
        routerLink="/add"
        class="bottom-nav__cta"
      >
        <mat-icon>add</mat-icon>
      </a>
    </div>
      <a
        routerLink="/summary"
        routerLinkActive="text-indigo-600"
        class="bottom-nav__link"
      >
        <mat-icon>share</mat-icon>
      <span class="bottom-nav__label">{{ copy().summaryShort }}</span>
    </a>
  </nav>

  <mat-menu #languageMenu="matMenu" class="language-menu">
    @for (language of languages; track language.code) {
      <button mat-menu-item (click)="setLocale(language.code)" class="language-menu__item">
        <span class="language-menu__row">
          <span class="language-menu__native">{{ language.nativeLabel }}</span>
          <span class="language-menu__meta">{{ language.shortLabel }}</span>
        </span>
      </button>
    }
  </mat-menu>
</div>
