<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand__icon">
        <mat-icon class="brand__icon-symbol">auto_awesome</mat-icon>
      </div>
      <span class="brand__title">SubWise</span>
    </div>

    <nav class="sidebar__nav">
      <a
        routerLink="/"
        routerLinkActive="bg-indigo-50 text-indigo-700"
        [routerLinkActiveOptions]="{exact: true}"
        class="nav-link"
      >
        <mat-icon class="nav-link__icon">dashboard</mat-icon>
        Дашборд
      </a>
      <a
        routerLink="/sovety"
        routerLinkActive="bg-indigo-50 text-indigo-700"
        class="nav-link"
      >
        <mat-icon class="nav-link__icon">lightbulb</mat-icon>
        Советы
      </a>
      <a
        routerLink="/summary"
        routerLinkActive="bg-indigo-50 text-indigo-700"
        class="nav-link"
      >
        <mat-icon class="nav-link__icon">share</mat-icon>
        Мой итог
      </a>
    </nav>

    <div class="sidebar__cta">
      <a
        routerLink="/add"
        class="primary-link"
      >
        <mat-icon class="primary-link__icon">add</mat-icon>
        Добавить
      </a>
    </div>
  </aside>

  <main class="content">
    <router-outlet></router-outlet>
  </main>

  <nav class="bottom-nav">
    <a
      routerLink="/"
      routerLinkActive="text-indigo-600"
      [routerLinkActiveOptions]="{exact: true}"
      class="bottom-nav__link"
    >
      <mat-icon>dashboard</mat-icon>
      <span class="bottom-nav__label">Дашборд</span>
    </a>
    <a
      routerLink="/sovety"
      routerLinkActive="text-indigo-600"
      class="bottom-nav__link"
    >
      <mat-icon>lightbulb</mat-icon>
      <span class="bottom-nav__label">Советы</span>
    </a>
    <div class="bottom-nav__cta-wrap">
      <a
        routerLink="/add"
        class="bottom-nav__cta"
      >
        <mat-icon>add</mat-icon>
      </a>
    </div>
      <a
        routerLink="/summary"
        routerLinkActive="text-indigo-600"
        class="bottom-nav__link"
      >
        <mat-icon>share</mat-icon>
      <span class="bottom-nav__label">Итог</span>
    </a>
  </nav>
</div>
